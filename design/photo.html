<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ph1l74 — Moscow Winter 2023 · Photo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;700&family=Barlow+Condensed:wght@700;800;900&family=Figtree:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:           oklch(0.10 0.006 25);
      --surface:      oklch(0.14 0.006 25);
      --surface-hi:   oklch(0.18 0.006 25);
      --photo-bg:     oklch(0.06 0.004 25);
      --text:         oklch(0.95 0.006 25);
      --text-muted:   oklch(0.48 0.006 25);
      --red:          oklch(0.48 0.20 25);
      --red-light:    oklch(0.62 0.22 25);

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Figtree', sans-serif;
      --font-mono:    'Azeret Mono', monospace;

      --space-xs:   4px;
      --space-sm:   8px;
      --space-md:   16px;
      --space-lg:   24px;
      --space-xl:   32px;
      --space-2xl:  48px;
      --space-3xl:  64px;
    }

    [data-theme="light"] {
      --bg:          oklch(0.97 0.006 25);
      --surface:     oklch(0.92 0.008 25);
      --surface-hi:  oklch(0.87 0.008 25);
      --photo-bg:    oklch(0.08 0.004 25);
      --text:        oklch(0.12 0.006 25);
      --text-muted:  oklch(0.52 0.006 25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    /* ── HEADER ── */
    header {
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      transition: background-color 0.25s ease;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--text);
    }
    .logo .accent { color: var(--red); }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-mono);
      font-size: 0.66rem;
    }
    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb a:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; border-radius: 1px; }
    .breadcrumb-sep { color: var(--text-muted); opacity: 0.4; }
    .breadcrumb-current { color: var(--text-muted); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      min-height: 0;
    }

    /* ── PHOTO PANE ── */
    .photo-pane {
      background: var(--photo-bg);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100svh - 60px);
    }

    .photo-pane img {
      max-width: 100%;
      max-height: calc(100svh - 60px);
      object-fit: contain;
      display: block;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: background-color 0.15s ease;
    }
    .nav-arrow:hover { background: var(--red); color: oklch(0.97 0.006 25); }
    .nav-arrow:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }
    .nav-arrow.prev { left: var(--space-lg); }
    .nav-arrow.next { right: var(--space-lg); }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: var(--space-xl) var(--space-lg);
    }

    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      margin-bottom: var(--space-md);
      display: block;
    }

    /* context */
    .context-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface-hi);
      padding: var(--space-xs) var(--space-md);
      text-decoration: none;
      color: var(--text);
      transition: background-color 0.15s ease;
    }
    .context-badge:hover { background: var(--text); color: var(--bg); }
    .context-badge:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; border-radius: 1px; }
    .context-dot { width: 5px; height: 5px; background: var(--red); flex-shrink: 0; }

    /* date */
    .photo-date {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .photo-date-sub {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: var(--text-muted);
      margin-top: var(--space-sm);
    }

    /* EXIF */
    .exif-toggle-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .exif-btn {
      width: 28px;
      height: 28px;
      background: var(--surface-hi);
      border: none;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    .exif-btn:hover, .exif-btn[aria-expanded="true"] { background: var(--red); color: oklch(0.97 0.006 25); }
    .exif-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    .exif-btn-label {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .exif-data {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .exif-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-md);
    }

    .exif-key {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .exif-val {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-align: right;
    }

    /* tags */
    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-xs) var(--space-md);
      background: var(--surface-hi);
      color: var(--text-muted);
      text-decoration: none;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    .tag:hover { background: var(--red); color: oklch(0.97 0.006 25); }
    .tag:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; border-radius: 1px; }

    /* sidebar divider: spacing only */
    .sidebar-section + .sidebar-section {
      padding-top: 0;
    }
    .sidebar-divider {
      height: 1px;
      background: var(--surface-hi);
      margin: 0 var(--space-lg);
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      header { padding: 0 var(--space-md); height: 52px; }

      .layout {
        grid-template-columns: 1fr;
      }

      .photo-pane {
        min-height: 70vw;
      }

      .photo-pane img { max-height: 70vw; }

      .nav-arrow { width: 40px; height: 40px; font-size: 0.9rem; }
      .nav-arrow.prev { left: var(--space-sm); }
      .nav-arrow.next { right: var(--space-sm); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">ph<span class="accent">1</span>l74</a>
    <div class="breadcrumb">
      <a href="album.html">Moscow Winter 2023</a>
      <span class="breadcrumb-sep" aria-hidden="true">›</span>
      <span class="breadcrumb-current">8 / 48</span>
    </div>
  </header>

  <div class="layout">

    <div class="photo-pane">
      <img src="https://picsum.photos/seed/main/1200/1600" alt="Street photo from Moscow, December 2023" />
      <button class="nav-arrow prev" aria-label="Previous photo">←</button>
      <button class="nav-arrow next" aria-label="Next photo">→</button>
    </div>

    <aside class="sidebar" aria-label="Photo details">

      <div class="sidebar-section">
        <span class="sidebar-label">Viewing from</span>
        <a class="context-badge" href="album.html">
          <span class="context-dot" aria-hidden="true"></span>
          Moscow Winter 2023
        </a>
      </div>

      <div class="sidebar-divider" role="separator"></div>

      <div class="sidebar-section">
        <span class="sidebar-label">Shot on</span>
        <div class="photo-date">14.12.2023</div>
        <div class="photo-date-sub">Published 20.01.2024</div>
      </div>

      <div class="sidebar-divider" role="separator"></div>

      <div class="sidebar-section">
        <div class="exif-toggle-row">
          <button class="exif-btn" id="exifBtn" aria-expanded="true" aria-controls="exifData">i</button>
          <span class="exif-btn-label">EXIF Data</span>
        </div>
        <div class="exif-data" id="exifData">
          <div class="exif-row">
            <span class="exif-key">Camera</span>
            <span class="exif-val">Fujifilm X-T4</span>
          </div>
          <div class="exif-row">
            <span class="exif-key">Lens</span>
            <span class="exif-val">23mm f/2</span>
          </div>
          <div class="exif-row">
            <span class="exif-key">Aperture</span>
            <span class="exif-val">f/5.6</span>
          </div>
          <div class="exif-row">
            <span class="exif-key">Shutter</span>
            <span class="exif-val">1/500s</span>
          </div>
          <div class="exif-row">
            <span class="exif-key">ISO</span>
            <span class="exif-val">3200</span>
          </div>
          <div class="exif-row">
            <span class="exif-key">Focal length</span>
            <span class="exif-val">23mm</span>
          </div>
        </div>
      </div>

      <div class="sidebar-divider" role="separator"></div>

      <div class="sidebar-section">
        <span class="sidebar-label">Tags</span>
        <div class="tags-list">
          <a href="#" class="tag">Night</a>
          <a href="#" class="tag">People</a>
          <a href="#" class="tag">Street</a>
          <a href="#" class="tag">Moscow</a>
        </div>
      </div>

    </aside>
  </div>

  <script>
    const html = document.documentElement;
    const saved = localStorage.getItem('ph1l74-theme') || 'dark';
    html.setAttribute('data-theme', saved);

    const exifBtn = document.getElementById('exifBtn');
    const exifData = document.getElementById('exifData');

    exifBtn.addEventListener('click', () => {
      const isOpen = exifBtn.getAttribute('aria-expanded') === 'true';
      exifBtn.setAttribute('aria-expanded', String(!isOpen));
      exifData.hidden = isOpen;
    });
  </script>

</body>
</html>
