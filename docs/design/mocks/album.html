<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ph1l74 — Moscow Winter 2023</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;700&family=Barlow+Condensed:wght@700;800;900&family=Figtree:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:           oklch(0.10 0.006 25);
      --surface:      oklch(0.14 0.006 25);
      --surface-hi:   oklch(0.18 0.006 25);
      --text:         oklch(0.95 0.006 25);
      --text-muted:   oklch(0.48 0.006 25);
      --red:          oklch(0.48 0.20 25);
      --red-light:    oklch(0.62 0.22 25);

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Figtree', sans-serif;
      --font-mono:    'Azeret Mono', monospace;

      --space-xs:   4px;
      --space-sm:   8px;
      --space-md:   16px;
      --space-lg:   24px;
      --space-xl:   32px;
      --space-2xl:  48px;
      --space-3xl:  64px;
      --space-4xl:  96px;
    }

    [data-theme="light"] {
      --bg:          oklch(0.97 0.006 25);
      --surface:     oklch(0.92 0.008 25);
      --surface-hi:  oklch(0.88 0.008 25);
      --text:        oklch(0.12 0.006 25);
      --text-muted:  oklch(0.52 0.006 25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    /* ── HEADER ── */
    header {
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      transition: background-color 0.25s ease;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--text);
    }
    .logo .accent { color: var(--red); }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2xl);
    }

    nav {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
    }

    nav a {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.15s ease;
    }
    nav a:hover { color: var(--text); }
    nav a:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; border-radius: 1px; }
    nav a[aria-current="page"] { color: var(--red); }

    .theme-toggle {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s ease;
    }
    .theme-toggle:hover { color: var(--text); }
    .theme-toggle:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; border-radius: 1px; }

    /* ── ALBUM HEADER ── */
    .album-header {
      padding: var(--space-3xl) var(--space-xl) var(--space-2xl);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2xl);
      align-items: end;
    }

    .album-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .album-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
      line-height: 2;
    }

    .album-meta-badge {
      display: block;
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--red);
      margin-bottom: var(--space-xs);
    }

    /* ── TAG FILTER ── */
    .tag-filter {
      padding: 0 var(--space-xl) var(--space-xl);
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      align-items: center;
    }

    .tag-filter-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      margin-right: var(--space-xs);
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-xs) var(--space-md);
      background: var(--surface);
      color: var(--text-muted);
      text-decoration: none;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .tag:hover { background: var(--text); color: var(--bg); }
    .tag.active { background: var(--red); color: oklch(0.97 0.006 25); }
    .tag:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; border-radius: 1px; }

    /* ── PHOTO GRID ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      padding: 0 var(--space-xl) var(--space-3xl);
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 2/3;
      background: var(--surface);
      display: block;
      text-decoration: none;
    }
    .photo-card:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; border-radius: 1px; }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.72;
      transition: opacity 0.35s ease-out, transform 0.45s ease-out;
    }
    .photo-card:hover img,
    .photo-card:focus-visible img { opacity: 1; transform: scale(1.04); }

    .photo-card-tags {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-2xl) var(--space-sm) var(--space-sm);
      background: linear-gradient(transparent, oklch(0.06 0.004 25 / 0.92));
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
      opacity: 0;
      transition: opacity 0.25s ease-out;
    }
    .photo-card:hover .photo-card-tags,
    .photo-card:focus-visible .photo-card-tags { opacity: 1; }

    .photo-card-tag {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: oklch(0.88 0.006 25);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: var(--space-3xl) var(--space-xl) var(--space-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .footer-logo { font-size: 0.65rem; color: var(--text-muted); }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      header { padding: 0 var(--space-md); height: 52px; }
      .header-right { gap: var(--space-lg); }
      nav { gap: var(--space-md); }

      .album-header {
        grid-template-columns: 1fr;
        padding: var(--space-2xl) var(--space-md) var(--space-xl);
        gap: var(--space-lg);
      }
      .album-meta { text-align: left; }

      .tag-filter { padding: 0 var(--space-md) var(--space-lg); }

      .photos-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-sm);
        padding: 0 var(--space-md) var(--space-2xl);
      }

      footer { padding: var(--space-2xl) var(--space-md) var(--space-lg); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">ph<span class="accent">1</span>l74</a>
    <div class="header-right">
      <nav>
        <a href="#" aria-current="page">Latest</a>
        <a href="#">Special</a>
        <a href="#" >Albums</a>
        <a href="#">Tags</a>
      </nav>
      <button class="theme-toggle" id="themeBtn" aria-label="Toggle color theme">Light</button>
    </div>
  </header>

  <div class="album-header">
    <h1 class="album-title">Moscow<br/>Winter<br/>2023</h1>
    <div class="album-meta">
      <span class="album-meta-badge">Special</span>
      48 photos<br/>

  </div>

  <div class="tag-filter" role="group" aria-label="Filter by tag">

  <div class="photos-grid">
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p1/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Night</span>

    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p2/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Snow</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">

      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Architecture</span>
        <span class="photo-card-tag">Night</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p4/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Metro</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p5/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Street</span>
        <span class="photo-card-tag">People</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p6/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Snow</span>
        <span class="photo-card-tag">Architecture</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p7/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Night</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p8/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">People</span>
      </div>
    </a>
    <a class="photo-card" href="photo.html">
      <img src="https://picsum.photos/seed/p9/600/900" alt="Photo from Moscow Winter 2023" />
      <div class="photo-card-tags" aria-hidden="true">
        <span class="photo-card-tag">Metro</span>
        <span class="photo-card-tag">Street</span>
      </div>
    </a>
  </div>

  <footer>
    <span class="footer-copy">Moscow Winter 2023 — 48 photos</span>
    <a class="logo footer-logo" href="index.html" aria-label="Back to home">
      ph<span class="accent">1</span>l74
    </a>
  </footer>

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('themeBtn');
    const saved = localStorage.getItem('ph1l74-theme') || 'dark';
    html.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? 'Light' : 'Dark';

    btn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('ph1l74-theme', next);
      btn.textContent = next === 'dark' ? 'Light' : 'Dark';
    });
  </script>

</body>
</html>
