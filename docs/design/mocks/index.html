<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ph1l74 — Filat Astakhov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;700&family=Barlow+Condensed:wght@700;800;900&family=Figtree:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:           oklch(0.10 0.006 25);
      --surface:      oklch(0.14 0.006 25);
      --text:         oklch(0.95 0.006 25);
      --text-muted:   oklch(0.48 0.006 25);
      --red:          oklch(0.48 0.20 25);
      --red-light:    oklch(0.62 0.22 25);

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Figtree', sans-serif;
      --font-mono:    'Azeret Mono', monospace;

      --space-xs:   4px;
      --space-sm:   8px;
      --space-md:   16px;
      --space-lg:   24px;
      --space-xl:   32px;
      --space-2xl:  48px;
      --space-3xl:  64px;
      --space-4xl:  96px;
    }

    [data-theme="light"] {
      --bg:         oklch(0.97 0.006 25);
      --surface:    oklch(0.92 0.008 25);
      --text:       oklch(0.12 0.006 25);
      --text-muted: oklch(0.52 0.006 25);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    /* ── HEADER ── */
    header {
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      transition: background-color 0.25s ease;
    }

    .logo {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--text);
    }
    .logo .accent { color: var(--red); }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2xl);
    }

    nav {
      display: flex;
      align-items: center;
      gap: var(--space-xl);
    }

    nav a {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      text-decoration: none;
      color: var(--text-muted);
      transition: color 0.15s ease;
    }
    nav a:hover { color: var(--text); }
    nav a:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; border-radius: 1px; }
    nav a[aria-current="page"] { color: var(--red); }

    .theme-toggle {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s ease;
    }
    .theme-toggle:hover { color: var(--text); }
    .theme-toggle:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; border-radius: 1px; }

    /* ── HERO ── */
    .hero {
      padding: var(--space-4xl) var(--space-xl) var(--space-3xl);
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: var(--space-3xl);
      align-items: end;
    }

    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(5rem, 14vw, 11rem);
      font-weight: 900;
      line-height: 0.87;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .hero-name .accent { color: var(--red); }

    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      padding-bottom: 0.5rem;
    }

    .hero-meta-role {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--red);
    }

    .hero-meta-lines {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.9;
    }

    /* ── COLLECTIONS ── */
    .collections-header {
      padding: 0 var(--space-xl);
      margin-bottom: var(--space-lg);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .collections-label {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
    }

    /* ── CAROUSEL ── */
    .carousel {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      padding: 0 var(--space-xl);
    }

    .carousel-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      text-decoration: none;
      color: var(--text);
    }
    .carousel-item:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; border-radius: 1px; }

    .carousel-item-img {
      overflow: hidden;
      aspect-ratio: 3/4;
      background: var(--surface);
    }

    .carousel-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.55;
      transition: opacity 0.35s ease-out, transform 0.45s ease-out;
    }
    .carousel-item:hover .carousel-item-img img,
    .carousel-item:focus-visible .carousel-item-img img {
      opacity: 1;
      transform: scale(1.04);
    }

    .carousel-item-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 var(--space-xs);
    }

    .carousel-item-name {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .carousel-item-count {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: auto;
      padding: var(--space-3xl) var(--space-xl) var(--space-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .footer-logo {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      header {
        padding: 0 var(--space-md);
        height: 52px;
      }
      .header-right { gap: var(--space-lg); }
      nav { gap: var(--space-md); }

      .hero {
        grid-template-columns: 1fr;
        padding: var(--space-2xl) var(--space-md) var(--space-xl);
        gap: var(--space-xl);
      }

      .collections-header { padding: 0 var(--space-md); }

      .carousel {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-sm);
        padding: 0 var(--space-md);
      }

      footer { padding: var(--space-2xl) var(--space-md) var(--space-lg); }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">ph<span class="accent">1</span>l74</a>
    <div class="header-right">
      <nav>
        <a href="album.html">Latest</a>
        <a href="album.html">Special</a>
        <a href="album.html">Albums</a>
        <a href="#">Tags</a>
      </nav>
      <button class="theme-toggle" id="themeBtn" aria-label="Toggle color theme">Light</button>
    </div>
  </header>

  <section class="hero" aria-label="Photographer introduction">
    <h1 class="hero-name">
      Filat<br/>
      <span class="accent">Astakhov</span>
    </h1>
    <div class="hero-meta">
      <span class="hero-meta-role">Street photographer</span>
      <p class="hero-meta-lines">
        Based in Russia<br/>
        Documentary &amp; urban<br/>
        Since 2018
      </p>
    </div>
  </section>

  <div class="collections-header">
    <span class="collections-label">Sections</span>
    <span class="collections-label">4 collections</span>
  </div>

  <nav class="carousel" aria-label="Browse sections">
    <a class="carousel-item" href="album.html">
      <div class="carousel-item-img">
        <img src="https://picsum.photos/seed/latest/600/800" alt="" />
      </div>
      <div class="carousel-item-info">
        <span class="carousel-item-name">Latest</span>
        <span class="carousel-item-count">128</span>
      </div>
    </a>
    <a class="carousel-item" href="album.html">
      <div class="carousel-item-img">
        <img src="https://picsum.photos/seed/special/600/800" alt="" />
      </div>
      <div class="carousel-item-info">
        <span class="carousel-item-name">Special</span>
        <span class="carousel-item-count">4</span>
      </div>
    </a>
    <a class="carousel-item" href="album.html">
      <div class="carousel-item-img">
        <img src="https://picsum.photos/seed/albums/600/800" alt="" />
      </div>
      <div class="carousel-item-info">
        <span class="carousel-item-name">Albums</span>
        <span class="carousel-item-count">12</span>
      </div>
    </a>
    <a class="carousel-item" href="#">
      <div class="carousel-item-img">
        <img src="https://picsum.photos/seed/tags/600/800" alt="" />
      </div>
      <div class="carousel-item-info">
        <span class="carousel-item-name">Tags</span>
        <span class="carousel-item-count">37</span>
      </div>
    </a>
  </nav>

  <footer>
    <span class="footer-copy">© 2024 Filat Astakhov</span>
    <a class="logo footer-logo" href="index.html" aria-label="Back to home">
      ph<span class="accent">1</span>l74
    </a>
  </footer>

  <script>
    const html = document.documentElement;
    const btn = document.getElementById('themeBtn');
    const saved = localStorage.getItem('ph1l74-theme') || 'dark';
    html.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? 'Light' : 'Dark';

    btn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('ph1l74-theme', next);
      btn.textContent = next === 'dark' ? 'Light' : 'Dark';
    });
  </script>

</body>
</html>
